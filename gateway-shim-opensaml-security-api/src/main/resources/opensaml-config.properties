# Picked up automatically by OpenSAML 5.x via the built-in
# org.opensaml.core.config.provider.ClasspathConfigurationPropertiesSource,
# which is registered under META-INF/services/org.opensaml.core.config.ConfigurationPropertiesSource
# and reads this file from the classpath root.
#
# These keys disable the BouncyCastle-dependent code paths in OpenSAML so that
# Knox can run with a FIPS JCE provider (e.g. SafeLogic CryptoComply for Java)
# that does not expose the standard BouncyCastle JCE API.

# Suppress the second BouncyCastle curve registration pass in
# org.opensaml.security.config.GlobalNamedCurveRegistryInitializer.
# (The first pass via META-INF/services is stripped by this artifact's shade config.)
opensaml.config.ec.registerBouncyCastleCurves=false

# Force OpenSAML's ECDH key agreement to use PBKDF2 instead of the default
# BouncyCastle-backed KDF in opensaml-xmlsec-impl.
opensaml.config.ecdh.defaultKDF=PBKDF2
